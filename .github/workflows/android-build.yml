name: Build Android APK

# Auto-builds an unsigned debug APK on every push to main and attaches it to a
# GitHub Release tagged "latest-apk". The /install page links to the asset
# below so users always download the freshest build.
#
# Asset URL pattern (stable):
#   https://github.com/<OWNER>/<REPO>/releases/download/latest-apk/mymyon.apk

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web bundle
        run: npm run build
        env:
          # Capacitor reads dist/ — strip the dev hot-reload server URL so the
          # APK ships with the bundled production assets.
          VITE_FORCE_PROD: "true"

      - name: Add Android platform
        run: |
          npm install --no-save --legacy-peer-deps @capacitor/android
          npx cap add android || echo "android already added"
          npx cap sync android

      - name: Patch capacitor.config for production (remove server.url)
        run: |
          node -e "
            const fs=require('fs');
            const p='android/app/src/main/assets/capacitor.config.json';
            if (fs.existsSync(p)) {
              const cfg=JSON.parse(fs.readFileSync(p,'utf8'));
              delete cfg.server;
              fs.writeFileSync(p, JSON.stringify(cfg,null,2));
              console.log('Stripped server.url for production APK');
            }
          "

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/mymyon.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymyon-apk
          path: artifacts/mymyon.apk

      - name: Publish to "latest-apk" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest Android APK
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.
            Install on Android: enable "Install unknown apps" for your browser, then open the file.
          files: artifacts/mymyon.apk
          make_latest: "false"
