name: Build Android APK

# Auto-builds an unsigned debug APK on every push to main and attaches it to a
# GitHub Release tagged "latest-apk". The /install page links to the asset
# below so users always download the freshest build.
#
# Asset URL pattern (stable):
#   https://github.com/<OWNER>/<REPO>/releases/download/latest-apk/mymyon.apk

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      # Opt into Node.js 24 for JS-based actions (checkout, setup-node, etc.)
      # to silence Node 20 deprecation warnings ahead of June 2026.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Compute version (timestamp + short SHA)
        id: version
        run: |
          VC=$(date +%s)
          VN="$(date +%Y.%m.%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore (early — needed for SHA fingerprint)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "Keystore decoded ($(wc -c < "$RUNNER_TEMP/release.keystore") bytes)"

      - name: Extract signing SHA fingerprints
        id: sha
        run: |
          if [ -f "$RUNNER_TEMP/release.keystore" ]; then
            KEYTOOL_OUT=$(keytool -list -v \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
              -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" 2>/dev/null || true)
          else
            KEYTOOL_OUT=$(keytool -list -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android 2>/dev/null || \
              keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey \
              -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000 >/dev/null 2>&1 && \
              keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey \
              -storepass android -keypass android)
          fi
          SHA1=$(echo "$KEYTOOL_OUT" | grep -E "SHA1:" | head -1 | sed 's/.*SHA1:[[:space:]]*//' | tr -d ' \r')
          SHA256=$(echo "$KEYTOOL_OUT" | grep -E "SHA256:" | head -1 | sed 's/.*SHA256:[[:space:]]*//' | tr -d ' \r')
          [ -z "$SHA1" ] && SHA1="unknown"
          [ -z "$SHA256" ] && SHA256="unknown"
          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA-1: $SHA1"
          echo "SHA-256: $SHA256"

      - name: Inject build info into source (visible in Settings → About)
        run: |
          BUILT_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p src/generated
          cat > src/generated/buildInfo.ts <<EOF
          // AUTO-GENERATED by .github/workflows/android-build.yml — do not edit.
          export const BUILD_INFO = {
            signingSha1: "${{ steps.sha.outputs.sha1 }}",
            signingSha256: "${{ steps.sha.outputs.sha256 }}",
            buildVersionName: "${{ steps.version.outputs.version_name }}",
            buildVersionCode: "${{ steps.version.outputs.version_code }}",
            commitSha: "$(echo ${{ github.sha }} | cut -c1-7)",
            builtAt: "$BUILT_AT",
          } as const;
          EOF
          cat src/generated/buildInfo.ts

      - name: Build web bundle
        run: npm run build
        env:
          VITE_FORCE_PROD: "true"


      - name: Add Android platform
        run: |
          npm install --no-save --legacy-peer-deps @capacitor/android @capacitor/assets
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
            rm -rf android
            npx cap add android
          else
            echo "Android platform already present"
          fi
          if [ -f "$RUNNER_TEMP/release.keystore" ]; then
            cp "$RUNNER_TEMP/release.keystore" android/app/release.keystore
          fi
          npx cap sync android

      - name: Generate Android icons & splash from /resources
        run: npx @capacitor/assets generate --android --assetPath resources

      - name: Patch capacitor.config for production (remove server.url)
        run: |
          node -e "
            const fs=require('fs');
            const p='android/app/src/main/assets/capacitor.config.json';
            if (fs.existsSync(p)) {
              const cfg=JSON.parse(fs.readFileSync(p,'utf8'));
              delete cfg.server;
              fs.writeFileSync(p, JSON.stringify(cfg,null,2));
              console.log('Stripped server.url for production APK');
            }
          "

      - name: Patch AndroidManifest for mymyon:// deep link (OAuth callback)
        run: |
          test -f android/app/src/main/AndroidManifest.xml
          node -e "
            const fs = require('fs');
            const path = 'android/app/src/main/AndroidManifest.xml';
            let xml = fs.readFileSync(path, 'utf8');
            if (xml.includes('android:scheme=\"mymyon\"')) {
              console.log('Deep link already present');
              process.exit(0);
            }
            const intentFilter = \`
                <intent-filter>
                    <action android:name=\\\"android.intent.action.VIEW\\\" />
                    <category android:name=\\\"android.intent.category.DEFAULT\\\" />
                    <category android:name=\\\"android.intent.category.BROWSABLE\\\" />
                    <data android:scheme=\\\"mymyon\\\" android:host=\\\"auth-callback\\\" />
                </intent-filter>\`;
            xml = xml.replace(/(<\/activity>)/, intentFilter + '\\n            \$1');
            fs.writeFileSync(path, xml);
            console.log('Added mymyon:// deep link intent filter');
          "

      - name: Patch AndroidManifest with notification + location permissions
        run: |
          test -f android/app/src/main/AndroidManifest.xml
          node -e "
            const fs = require('fs');
            const path = 'android/app/src/main/AndroidManifest.xml';
            let xml = fs.readFileSync(path, 'utf8');
            const perms = [
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.ACCESS_FINE_LOCATION',
            ];
            for (const p of perms) {
              if (!xml.includes('android:name=\\\"' + p + '\\\"')) {
                const tag = '    <uses-permission android:name=\\\"' + p + '\\\" />';
                xml = xml.replace(/(<application )/, tag + '\\n\\n    \$1');
                console.log('Added permission:', p);
              }
            }
            fs.writeFileSync(path, xml);
          "

      - name: Inject versionCode/versionName into build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.version_code }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.version_name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Grant gradlew permission
        run: chmod +x android/gradlew


      - name: Configure release signing in build.gradle
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          python3 <<'PY'
          import re
          p = "android/app/build.gradle"
          with open(p) as f:
              g = f.read()
          if "signingConfigs {" not in g:
              block = (
                  "\n    signingConfigs {\n"
                  "        release {\n"
                  "            storeFile file('release.keystore')\n"
                  "            storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')\n"
                  "            keyAlias System.getenv('ANDROID_KEY_ALIAS')\n"
                  "            keyPassword System.getenv('ANDROID_KEY_PASSWORD')\n"
                  "        }\n"
                  "    }\n"
              )
              g = g.replace("android {", "android {" + block, 1)
          if "signingConfig signingConfigs.release" not in g:
              g = re.sub(
                  r"(buildTypes\s*\{\s*release\s*\{)",
                  r"\1\n            signingConfig signingConfigs.release",
                  g,
                  count=1,
              )
          with open(p, "w") as f:
              f.write(g)
          print("Configured release signing")
          PY


      - name: Build APK (release if keystore present, else debug)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f app/release.keystore ]; then
            echo "Building signed release APK"
            ./gradlew assembleRelease --no-daemon
          else
            echo "No keystore secret — falling back to debug APK"
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Print signing fingerprints (also baked into Settings → About)
        run: |
          echo "===== Signing fingerprints ====="
          echo "SHA-1:   ${{ steps.sha.outputs.sha1 }}"
          echo "SHA-256: ${{ steps.sha.outputs.sha256 }}"
          echo "Package: com.mymyon.app"
          echo "================================"


      - name: Rename APK
        run: |
          mkdir -p artifacts
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk artifacts/mymyon.apk
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk artifacts/mymyon.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/mymyon.apk
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymyon-apk
          path: artifacts/mymyon.apk

      - name: Publish to "latest-apk" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: ${{ steps.version.outputs.version_name }}
          body: |
            versionCode: ${{ steps.version.outputs.version_code }}
            versionName: ${{ steps.version.outputs.version_name }}
            commit: ${{ github.sha }}
          files: artifacts/mymyon.apk
          make_latest: "false"
